# Throwaway feasibility probe for the data pipeline (#9 / #4 stats source).
# Runs on GitHub's runners, which have open internet (unlike the dev sandbox).
# Remove once the data approach is decided.
name: Data probe

on:
  workflow_dispatch:
  push:
    branches: [claude/nba-roster-apron-analyzer-u6oonq]
    paths:
      - 'scripts/data-probe.mjs'
      - '.github/workflows/data-probe.yml'

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Probe data sources
        run: node scripts/data-probe.mjs
