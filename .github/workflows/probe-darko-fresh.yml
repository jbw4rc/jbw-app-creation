name: Probe DARKO fresh
on:
  workflow_dispatch:
  push:
    branches: [claude/nba-roster-apron-analyzer-u6oonq]
    paths:
      - 'scripts/probe-darko-fresh.mjs'
      - '.github/workflows/probe-darko-fresh.yml'
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/probe-darko-fresh.mjs
      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f probe-fresh-out.txt
          git commit -m "probe darko fresh output" || echo "no change"
          git pull --rebase --autostash || true
          git push || (git pull --rebase --autostash && git push)
