name: TW probe
on:
  push:
    branches: [claude/nba-roster-apron-analyzer-u6oonq]
    paths: ['scripts/tw-probe.mjs', '.github/workflows/tw-probe.yml']
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/tw-probe.mjs
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f tw-debug.txt
          git commit -m "tw probe output" || echo "nothing"
          git pull --rebase && git push
