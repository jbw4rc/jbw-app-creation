# THROWAWAY probe: inspect SalarySwish team page for cap-holds structure.
# Delete this + scripts/probe-capholds.mjs once the parser is written.
name: Probe capholds
on:
  workflow_dispatch:
  push:
    branches: [claude/nba-roster-apron-analyzer-u6oonq]
    paths:
      - 'scripts/probe-capholds.mjs'
      - '.github/workflows/probe-capholds.yml'
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/probe-capholds.mjs || true
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f probe-capholds-out.txt
          git commit -m "probe capholds output" || echo "no changes"
          git push
