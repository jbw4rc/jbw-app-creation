# THROWAWAY probe: inspect darko.app for multi-year projection data.
# Delete this + scripts/probe-darko.mjs once the projection source is settled.
name: Probe darko
on:
  workflow_dispatch:
  push:
    branches: [claude/nba-roster-apron-analyzer-u6oonq]
    paths:
      - 'scripts/probe-darko.mjs'
      - '.github/workflows/probe-darko.yml'
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/probe-darko.mjs || true
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f probe-darko-out.txt
          git commit -m "probe darko output" || echo "no changes"
          git push
