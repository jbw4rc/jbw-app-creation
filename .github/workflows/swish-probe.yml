# Throwaway discovery probe for SalarySwish structure. Removed once mapped.
name: SalarySwish probe

on:
  workflow_dispatch:
  push:
    branches: [claude/nba-roster-apron-analyzer-u6oonq]
    paths:
      - 'scripts/swish-probe.mjs'
      - '.github/workflows/swish-probe.yml'

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/swish-probe.mjs
      - name: Commit findings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f swish-probe-output.txt swish-team-sample.html
          if git diff --staged --quiet; then echo "no output"; else git commit -m "SalarySwish probe output" && git push; fi
