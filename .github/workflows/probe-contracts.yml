# THROWAWAY probe: find a projected-FA-contract source. Delete after use.
name: Probe contracts
on:
  workflow_dispatch:
  push:
    branches: [claude/nba-roster-apron-analyzer-u6oonq]
    paths:
      - 'scripts/probe-contracts.mjs'
      - '.github/workflows/probe-contracts.yml'
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm i playwright@latest
      - run: npx playwright install --with-deps chromium
      - run: node scripts/probe-contracts.mjs || true
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f probe-contracts-out.txt
          git commit -m "probe contracts output" || echo "no changes"
          git push
